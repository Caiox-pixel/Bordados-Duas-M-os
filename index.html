<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Duas Mãos - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="cabecalho">
        <a href="index.html" class="logotipo-container">
            <img src="..//images/logo.jpeg" class="foto-logo">
            <h1>Duas Mãos</h1>
        </a>
        <nav>
            <button class="botao-topo btn-login" onclick="location.href='login.html'">Login</button>
            <button class="botao-topo btn-cadastro" onclick="location.href='cadastro.html'">Cadastrar</button>
            <i class="fas fa-shopping-cart" style="margin-left:15px; cursor:pointer;"></i>
        </nav>
    </header>

    <main>
        <section class="banner-destaque">
            <h1 style="font-size: 3rem;">Bordados Personalizados</h1>
        </section>

        <section class="vitrine-produtos">
            <div class="card-produto">
                <img src="..//images/produto1.jpeg" class="imagem-produto">
                <h3>Toalha De Urso</h3>
                <a href="https://wa.me/553498878348?text=Olá,%20gostaria%20de%20fazer%20um%20orçamento!aaa" target="_blank" class="etiqueta-preco">Ver Preço</a>
            </div>
            <div class="card-produto">
                <img src="..//images/produto3.jpeg" class="imagem-produto">
                <h3>Kit De Banho</h3>
                <a href="https://wa.me/553498878348?text=Olá,%20gostaria%20de%20fazer%20um%20orçamento!" target="_blank" class="etiqueta-preco">Ver Preço</a>
            </div>
            <div class="card-produto">
                <img src="..//images/produto5.jpeg" class="imagem-produto">
                <h3>Kit Toalha</h3>
                <a href="https://wa.me/553498878348?text=Olá,%20gostaria%20de%20fazer%20um%20orçamento!" target="_blank" class="etiqueta-preco">Ver Preço</a>
            </div>
            <div class="card-produto">
                <img src="..//images/produto6.jpeg" class="imagem-produto">
                <h3>Manta Pós Banho</h3>
                <a href="https://wa.me/553498878348?text=Olá,%20gostaria%20de%20fazer%20um%20orçamento!" target="_blank" class="etiqueta-preco">Ver Preço</a>
            </div>
        </section>

        <footer class="container-rotacao">
            <h3 id="texto-rotacao">Fazemos bordados personalizados sob encomenda!</h3>
        </footer>
    </main>

    <a href="https://wa.me/553498878348?text=Olá,%20gostaria%20de%20fazer%20um%20orçamento!" class="whatsapp-flutuante" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const frases = ["Bordados sob encomenda!", "Kits saída de maternidade.", "Enviamos para todo o Brasil!", "Presenteie com carinho."];
        let i = 0;
        setInterval(() => {
            const el = document.getElementById('texto-rotacao');
            el.style.opacity = 0;
            setTimeout(() => {
                el.textContent = frases[i];
                el.style.opacity = 1;
                i = (i + 1) % frases.length;
            }, 500);
        }, 3000);
