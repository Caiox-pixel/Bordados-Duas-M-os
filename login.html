<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Duas Mãos - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="corpo-acesso">
    <div class="container-acesso">
        <div class="coluna-formulario">
            <a href="index.html" class="link-voltar"><i class="fas fa-arrow-left"></i> Voltar</a>
            <h2 style="margin-bottom:20px;">Bem-vindo(a)</h2>
            <form>
                <div class="campo-texto">
                    <label>E-mail</label>
                    <input type="email" placeholder="Insira seu email">
                </div>
                <div class="campo-texto">
                    <label>Senha</label>
                    <input type="password" placeholder="Insira sua senha">
                </div>
                <p style="margin-bottom:15px;">Ainda não possui uma conta? <a href="cadastro.html" style="color:#b37d7d;">Cadastre-se</a></p>
                <button type="submit" class="botao-enviar">Entrar</button>
            </form>
        </div>
        <div class="coluna-imagem">
            <img src="..//images/produto1.jpeg">
        </div>
    </div>
</body>
</html>
