<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Duas Mãos - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="corpo-acesso">

    <main class="container-acesso">
        <section class="coluna-formulario">
            <a href="index.html" class="link-voltar">
                <i class="fas fa-arrow-left"></i> Voltar para o início
            </a>

            <h2 class="titulo-acesso">Bem-vindo(a)</h2>
            
            <form action="#">
                <div class="campo-texto">
                    <label>E-mail</label>
                    <input type="email" placeholder="Insira seu email" required>
                </div>
                <div class="campo-texto">
                    <label>Senha</label>
                    <input type="password" placeholder="Insira sua senha" required>
                </div>
                
                <button type="submit" class="botao-enviar">Entrar</button>
            </form>
        </section>

        <aside class="coluna-imagem">
            <img src="produto1.jpeg" alt="Bordado Personalizado">
        </aside>
    </main>

</body>
</html>
