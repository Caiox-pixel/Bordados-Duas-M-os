<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Duas Mãos - Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="corpo-acesso">
    <div class="container-acesso">
        <div class="coluna-formulario">
            <a href="index.html" class="link-voltar"><i class="fas fa-arrow-left"></i> Voltar</a>
            <h2 style="margin-bottom:20px;">Criar Conta</h2>
            <form>
                <div class="campo-texto">
                    <label>E-mail</label>
                    <input type="email" placeholder="Insira seu email">
                </div>
                <div class="campo-texto">
                    <label>Nome</label>
                    <input type="text" placeholder="Insira seu nome">
                </div>
                <div class="campo-texto">
                    <label>Senha</label>
                    <input type="password" placeholder="Insira sua senha">
                </div>
                <p style="margin-bottom:15px;">Já possui uma conta? <a href="login.html" style="color:#b37d7d;">Faça Login</a></p>
                <button type="submit" class="botao-enviar">Cadastrar</button>
            </form>
        </div>
        <div class="coluna-imagem">
            <img src="..//images/produto6.jpeg">
        </div>
    </div>
</body>
</html>
