<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Duas Mãos - Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="corpo-acesso">

    <main class="container-acesso">
        <section class="coluna-formulario">
            <a href="index.html" class="link-voltar">
                <i class="fas fa-arrow-left"></i> Voltar para o início
            </a>

            <h2 class="titulo-acesso">Criar Conta</h2>
            
            <form action="#">
                <div class="campo-texto">
                    <label>E-mail</label>
                    <input type="email" placeholder="Insira seu email" required>
                </div>
                <button type="submit" class="botao-enviar">Cadastrar</button>
            </form>
        </section>

        <aside class="coluna-imagem">
            <img src="produto6.jpeg" alt="Exemplo de Bordado">
        </aside>
    </main>
<form action="#">
    <p class="link-alternativo">
        Já possui uma conta? <a href="login.html">Faça Login</a>
    </p>
    
    <button type="submit" class="botao-enviar">Cadastrar</button>
</form>
</body>
</html>
